version: "3.8"

services:
  # Triton Inference Server
  triton:
    container_name: triton-resnet152
    image: nvcr.io/nvidia/tritonserver:24.10-py3
    ports:
      - 8000:8000 # HTTP API
      - 8001:8001 # gRPC API
      - 8002:8002 # Metrics Monitoring
    restart: always
    volumes:
      - ./triton/models:/models
    command: ["tritonserver", "--model-store=/models"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # FastAPI server
  fastapi-app:
    container_name: fastapi-app-resnet152
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - 5000:5000
    environment:
      - TRITON_SERVER_URL=triton:8001
    depends_on:
      - triton
    restart: always

  # TensorRT Conventer
  trtexec_container:
    container_name: trtexec_container_triton-resnet152
    image: nvcr.io/nvidia/tensorrt:24.10-py3
    volumes:
      - ./trtexec_workspace:/workspace
    command: ["tail", "-f", "/dev/null"]
    deploy:
      resources:
        reservations:
          devices:
            - capabilities: [gpu]
              count: all
              driver: nvidia

  # Prometheus (Metrics)
  prometheus:
    container_name: prometheus
    image: prom/prometheus:latest
    ports:
      - 9090:9090
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    restart: always

  # Grafana (Metrics Visualisation)
  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    user: 1000:1000
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    ports:
      - 3000:3000
    volumes:
      - grafana_storage:/var/lib/grafana
    restart: always

volumes:
  grafana_storage:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./grafana_data
